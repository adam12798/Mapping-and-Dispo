{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sutton | Daily</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'maps/style.css' %}" />
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="nav-tab">Map</a>
        <a href="/crm/" class="nav-tab">CRM</a>
        <a href="/reps/" class="nav-tab">Reps</a>
        <a href="/time-off/" class="nav-tab">Time Off</a>
        <a href="/daily/" class="nav-tab active">Daily</a>
    </nav>
    <div class="crm-container">
        <div class="crm-toolbar">
            <div class="crm-header">
                <h2>Daily Appointments</h2>
            </div>
            <div class="crm-filters">
                <div class="filter-group">
                    <label>Date</label>
                    <input type="date" id="date-picker" value="{{ selected_date }}" onchange="changeDate(this.value)">
                </div>
                <div class="filter-group">
                    <label>Rep</label>
                    <select id="filter-rep" onchange="filterTable()">
                        <option value="">All</option>
                        {% for rep in reps %}
                        <option value="{{ rep.id }}">{{ rep.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="filter-group">
                    <label>Disposition</label>
                    <select id="filter-dispo" onchange="filterTable()">
                        <option value="">All</option>
                        <option value="sale">Sale</option>
                        <option value="no_sale">No Sale</option>
                        <option value="follow_up">Follow Up</option>
                        <option value="credit_fail">Credit Fail</option>
                        <option value="cancel_door">Cancel at Door</option>
                        <option value="cpfu">CPFU</option>
                        <option value="rep_no_show">Rep No Show</option>
                        <option value="no_coverage">No Coverage</option>
                        <option value="needs_reschedule">Needs Reschedule</option>
                        <option value="none">No Disposition</option>
                    </select>
                </div>
                <button class="filter-clear" onclick="clearFilters()">Clear</button>
            </div>
        </div>
        <div class="crm-table-wrapper">
        <table class="crm-table">
            <thead>
                <tr>
                    <th class="sortable sticky-col sticky-name" onclick="sortTable(0)">Homeowner Name <span class="sort-arrow"></span></th>
                    <th class="sortable" onclick="sortTable(1)">Phone <span class="sort-arrow"></span></th>
                    <th class="sortable" onclick="sortTable(2)">Address <span class="sort-arrow"></span></th>
                    <th class="sortable" onclick="sortTable(3)">City <span class="sort-arrow"></span></th>
                    <th class="sortable" onclick="sortTable(4)">Appt Type <span class="sort-arrow"></span></th>
                    <th class="sortable" onclick="sortTable(5)">Time <span class="sort-arrow"></span></th>
                    <th class="sortable" onclick="sortTable(6)">Rep <span class="sort-arrow"></span></th>
                    <th class="sortable" onclick="sortTable(7)">Dispo <span class="sort-arrow"></span></th>
                </tr>
            </thead>
            <tbody>
                {% for lead in leads %}
                <tr data-id="{{ lead.id }}">
                    <td class="sticky-col sticky-name"><input type="text" class="crm-input" data-field="homeowner_name" value="{{ lead.homeowner_name }}"></td>
                    <td><input type="text" class="crm-input" data-field="phone_number" value="{{ lead.phone_number }}"></td>
                    <td><input type="text" class="crm-input" data-field="address" value="{{ lead.address }}"></td>
                    <td><input type="text" class="crm-input" data-field="city" value="{{ lead.city }}"></td>
                    <td>
                        <select class="crm-select" data-field="appointment_type">
                            <option value="">—</option>
                            <option value="solar" {% if lead.appointment_type == "solar" %}selected{% endif %}>Solar</option>
                            <option value="hvac" {% if lead.appointment_type == "hvac" %}selected{% endif %}>HVAC</option>
                            <option value="both" {% if lead.appointment_type == "both" %}selected{% endif %}>Both</option>
                        </select>
                    </td>
                    <td><input type="datetime-local" class="crm-input" data-field="appointment_datetime" value="{{ lead.appointment_datetime|date:'Y-m-d\TH:i'|default:'' }}"></td>
                    <td>
                        <select class="crm-select" data-field="rep_id">
                            <option value="" {% if not lead.rep %}selected{% endif %}>Unassigned</option>
                            {% for rep in reps %}
                            <option value="{{ rep.id }}" {% if lead.rep_id == rep.id %}selected{% endif %}>{{ rep.name }}</option>
                            {% endfor %}
                        </select>
                    </td>
                    <td>
                        <select class="crm-select dispo-select" data-field="disposition" onchange="updateDispoColor(this)">
                            <option value="">—</option>
                            <option value="sale" {% if lead.disposition == "sale" %}selected{% endif %}>Sale</option>
                            <option value="no_sale" {% if lead.disposition == "no_sale" %}selected{% endif %}>No Sale</option>
                            <option value="follow_up" {% if lead.disposition == "follow_up" %}selected{% endif %}>Follow Up</option>
                            <option value="credit_fail" {% if lead.disposition == "credit_fail" %}selected{% endif %}>Credit Fail</option>
                            <option value="cancel_door" {% if lead.disposition == "cancel_door" %}selected{% endif %}>Cancel at Door</option>
                            <option value="cpfu" {% if lead.disposition == "cpfu" %}selected{% endif %}>CPFU</option>
                            <option value="rep_no_show" {% if lead.disposition == "rep_no_show" %}selected{% endif %}>Rep No Show</option>
                            <option value="no_coverage" {% if lead.disposition == "no_coverage" %}selected{% endif %}>No Coverage</option>
                            <option value="needs_reschedule" {% if lead.disposition == "needs_reschedule" %}selected{% endif %}>Needs Reschedule</option>
                        </select>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="8" class="empty-row">No appointments for this date</td></tr>
                {% endfor %}
            </tbody>
        </table>
        </div>
    </div>

    <script>
        var dispoColors = {
            sale: '#27ae60',
            no_sale: '#8e44ad',
            follow_up: '#e67e22',
            credit_fail: '#ff69b4',
            cancel_door: '#95a5a6',
            cpfu: '#98c1d9',
            rep_no_show: '#111111',
            no_coverage: '#c0392b',
            needs_reschedule: '#3498db'
        };

        function updateDispoColor(select) {
            var color = dispoColors[select.value] || '';
            select.style.backgroundColor = color;
            select.style.color = color ? '#fff' : '';
            select.style.fontWeight = color ? '600' : '';
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.dispo-select').forEach(function(sel) {
                updateDispoColor(sel);
            });
        });

        function changeDate(date) {
            window.location.href = '/daily/?date=' + date;
        }

        var currentSortCol = -1;
        var currentSortAsc = true;

        function getCellValue(row, colIndex) {
            var cell = row.cells[colIndex];
            var input = cell.querySelector('input');
            var select = cell.querySelector('select');
            if (input) return input.value.toLowerCase();
            if (select) {
                var opt = select.options[select.selectedIndex];
                return opt ? opt.textContent.toLowerCase() : '';
            }
            return cell.textContent.trim().toLowerCase();
        }

        function sortTable(colIndex) {
            var tbody = document.querySelector('.crm-table tbody');
            var rows = Array.from(tbody.querySelectorAll('tr[data-id]'));

            if (currentSortCol === colIndex) {
                currentSortAsc = !currentSortAsc;
            } else {
                currentSortCol = colIndex;
                currentSortAsc = true;
            }

            var isDateCol = (colIndex === 5);

            rows.sort(function(a, b) {
                var valA = getCellValue(a, colIndex);
                var valB = getCellValue(b, colIndex);

                if (isDateCol) {
                    var dA = valA ? new Date(valA) : new Date(0);
                    var dB = valB ? new Date(valB) : new Date(0);
                    return currentSortAsc ? dA - dB : dB - dA;
                }

                if (valA < valB) return currentSortAsc ? -1 : 1;
                if (valA > valB) return currentSortAsc ? 1 : -1;
                return 0;
            });

            rows.forEach(function(row) { tbody.appendChild(row); });

            document.querySelectorAll('.sort-arrow').forEach(function(el) { el.textContent = ''; });
            var th = document.querySelectorAll('.crm-table thead th')[colIndex];
            var arrow = th.querySelector('.sort-arrow');
            if (arrow) arrow.textContent = currentSortAsc ? ' \u25B2' : ' \u25BC';
        }

        function saveField(leadId, field, value) {
            var body = {};
            body[field] = value;
            fetch('/api/leads/' + leadId + '/', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
        }

        function filterTable() {
            var fRep = document.getElementById('filter-rep').value;
            var fDispo = document.getElementById('filter-dispo').value;

            document.querySelectorAll('tbody tr').forEach(function(row) {
                if (!row.dataset.id) return;
                var show = true;

                if (fRep) {
                    var repSelect = row.querySelector('[data-field="rep_id"]');
                    if (!repSelect || repSelect.value !== fRep) show = false;
                }

                if (fDispo) {
                    var dispoSelect = row.querySelector('[data-field="disposition"]');
                    var dispoVal = dispoSelect ? dispoSelect.value : '';
                    if (fDispo === 'none') {
                        if (dispoVal) show = false;
                    } else {
                        if (dispoVal !== fDispo) show = false;
                    }
                }

                row.style.display = show ? '' : 'none';
            });
        }

        function clearFilters() {
            document.getElementById('filter-rep').value = '';
            document.getElementById('filter-dispo').value = '';
            filterTable();
        }

        document.querySelectorAll('.crm-input, .crm-select').forEach(function(el) {
            el.addEventListener('change', function() {
                var row = this.closest('tr');
                var leadId = row.dataset.id;
                var field = this.dataset.field;
                saveField(leadId, field, this.value);
            });
        });
    </script>
</body>
</html>
