{% extends "maps/base.html" %}
{% load static %}

{% block title %}Map{% endblock %}

{% block head_extra %}
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
{% endblock %}

{% block content %}
    <div class="map-wrapper">
    <div id="map"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">Appointments</div>
        <div id="sidebar-content"><div class="sidebar-empty">Select a date to see appointments</div></div>
    </div>
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">&#9664;</button>
    </div>
    <div class="route-panel collapsed" id="route-panel" {% if not is_manager %}style="display:none;"{% endif %}>
        <h4 onclick="toggleRoutePanel()">Route Planner <span class="route-panel-arrow" id="route-panel-arrow">&#9654;</span></h4>
        <div class="route-panel-body" id="route-panel-body">
            <input type="date" id="route-date" />
            <div style="display:flex;gap:6px;margin-top:2px;">
                <button onclick="showRoute()">Show Route</button>
                <button class="tomorrow-btn" onclick="setTomorrow()">Tomorrow</button>
            </div>
            <button class="tomorrow-btn" style="margin-top:4px;width:100%;" onclick="clearRoute()">Clear Route</button>
            <hr style="margin:8px 0;border:none;border-top:1px solid #ddd;">
            <button class="add-btn" style="width:100%;font-size:12px;padding:6px 12px;" onclick="autoAssign()">Auto-Assign</button>
            <button class="tomorrow-btn" style="margin-top:4px;width:100%;" onclick="clearAssignments()">Clear Assignments</button>
            <div id="assign-status" style="margin-top:6px;font-size:11px;color:#666;"></div>
            <div class="confirm-bar" id="confirm-bar">
                <button class="confirm-btn" onclick="confirmAssignments()">Confirm</button>
                <button class="redo-btn" onclick="redoAssignments()">Redo</button>
            </div>
        </div>
    </div>

{% endblock %}

                            fillColor: color,
                            fillOpacity: 0.7,
                            color: '#555',
                            weight: 1,
                            opacity: 0.5
                        };

                        var name = feature.properties.census_name || 'Unknown';
                        var normalized = name.replace(/ Town$/, '').replace(/^Manchester-by-the-Sea$/, 'Manchester');
                        // Check if this is a major city (has a pin)
                        var majorCities = ['Boston', 'Worcester', 'Springfield', 'Lowell', 'Cambridge',
                            'New Bedford', 'Brockton', 'Quincy', 'Lynn', 'Fall River', 'Pittsfield',
                            'Framingham', 'Haverhill', 'Plymouth', 'Barnstable', 'Northampton'];

                            poly.forEach(function(ring) {
                                allHoles.push(ring.map(function(c) { return [c[1], c[0]]; }));
                            });
                        });
                    }
                });

                // Single mask polygon with all town shapes as holes

                    renderer: canvasRenderer,
                    color: '#333',
                    weight: 1,
                    fillColor: '#ffffff',
                    fillOpacity: 1,
                    interactive: false
                }).addTo(map);

                addCities();
            })

                addCities();

            cities.forEach(function(city) {

                    iconSize: isMajor ? [12, 12] : [8, 8],
                    iconAnchor: isMajor ? [6, 6] : [4, 4]

                L.marker([lat, lng], { icon: dotIcon })
                    .bindTooltip(name, {
                        permanent: false,
                        direction: 'right',
                        offset: [8, 0],
                        className: 'city-label'
                    })
                    .addTo(map);
            });

            .then(function(reps) { allReps = reps; });

        // Fetch all leads once, then filter by date
        function fetchLeads() {
            fetch('/api/leads/')
                .then(function(r) { return r.json(); })
                .then(function(leads) {
                    allLeads = leads;
                    filterLeadsByDate();
                    updateSidebar(null);
                });
        }

        function filterLeadsByDate() {
            leadsLayer.clearLayers();
            var dateVal = document.getElementById('route-date').value;
            allLeads.forEach(function(lead) {
                // Only show leads with appointments on the selected date
                if (!lead.appointment_datetime) return;
                // appointment_datetime format: "MM/DD/YYYY HH:MM AM/PM"
                var parts = lead.appointment_datetime.split(' ');
                var dateParts = parts[0].split('/');
                var leadDate = dateParts[2] + '-' + dateParts[0].padStart(2, '0') + '-' + dateParts[1].padStart(2, '0');
                if (leadDate !== dateVal) return;

                var color = (!lead.appointment_type || !lead.appointment_format) ? '#ff69b4' : (leadTypeColors[lead.appointment_type] || '#ff69b4');
                var pinIcon = L.divIcon({
                    className: 'lead-pin',
                    html: '<div style="width:16px;height:16px;background:' + color + ';border:3px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,0.5);"></div>',
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                });

                L.marker([lead.lat, lead.lng], { icon: pinIcon })
                    .bindPopup(
                        '<strong>' + lead.address + '</strong><br>' +
                        (lead.homeowner_name ? lead.homeowner_name + '<br>' : '') +
                        '<em>' + lead.appointment_datetime + '</em>'
                    )
                    .addTo(leadsLayer);
            });
            // Always keep sidebar in sync with current date
            if (!pendingAssignments) {
                updateSidebar(null);
            }
        }

        // Default date to today
        var today = new Date();
        var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
        document.getElementById('route-date').value = todayStr;

        // Fetch leads after date is set, open sidebar
        fetchLeads();
        openSidebar();

        // Re-filter pins when date changes
        document.getElementById('route-date').addEventListener('change', function() {
            filterLeadsByDate();
            if (!pendingAssignments) {
                routeLayer.clearLayers();
            }
            updateSidebar(pendingAssignments);

        function setTomorrow() {
            var tmrw = new Date();
            tmrw.setDate(tmrw.getDate() + 1);
            var tmrwStr = tmrw.getFullYear() + '-' + String(tmrw.getMonth() + 1).padStart(2, '0') + '-' + String(tmrw.getDate()).padStart(2, '0');
            document.getElementById('route-date').value = tmrwStr;
            filterLeadsByDate();
            routeLayer.clearLayers();

        // Route overlay
        var routeLayer = L.layerGroup().addTo(map);

        function showRoute() {
            // If we have pending (unconfirmed) assignments, show those instead
            if (pendingAssignments) {
                renderPreviewRoutes(pendingAssignments);
                return;
            }
            var dateVal = document.getElementById('route-date').value;
            if (!dateVal) { alert('Pick a date'); return; }

            routeLayer.clearLayers();

            fetch('/api/route/?date=' + dateVal)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    // Multi-rep mode (assignments exist)
                    if (data.routes) {
                        if (data.routes.length === 0) {
                            alert('No assigned appointments on this date');
                            return;
                        }
                        var allPoints = [];
                        data.routes.forEach(function(route) {
                            var repColor = route.rep.color || '#2980b9';
                            var points = [];

                            // Rep home star
                            if (route.rep.lat && route.rep.lng) {
                                var homeIcon = L.divIcon({
                                    className: 'route-marker',
                                    html: '<div style="background:' + repColor + ';width:28px;height:28px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 0 6px rgba(0,0,0,0.4);">&#9733;</div>',
                                    iconSize: [24, 24],
                                    iconAnchor: [12, 12]
                                });
                                L.marker([route.rep.lat, route.rep.lng], { icon: homeIcon })
                                    .bindPopup('<strong>' + route.rep.name + ' (Home)</strong><br>' + route.rep.home_address)
                                    .addTo(routeLayer);
                                points.push([route.rep.lat, route.rep.lng]);
                            }

                            var typeColors = { solar: '#f1c40f', hvac: '#e74c3c', both: '#27ae60' };
                            route.stops.forEach(function(stop, i) {
                                var pinColor = typeColors[stop.type] || repColor;
                                var stopIcon = L.divIcon({
                                    className: 'route-marker',
                                    html: '<div style="background:' + pinColor + ';width:24px;height:24px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;box-shadow:0 0 6px rgba(0,0,0,0.4);">' + (i + 1) + '</div>',
                                    iconSize: [24, 24],
                                    iconAnchor: [12, 12]
                                });
                                var typeLabel = stop.type ? stop.type.charAt(0).toUpperCase() + stop.type.slice(1) : '';
                                L.marker([stop.lat, stop.lng], { icon: stopIcon })
                                    .bindPopup(
                                        '<strong>' + route.rep.name + ' #' + (i + 1) + ': ' + stop.name + '</strong><br>' +
                                        stop.address + (stop.city ? ', ' + stop.city : '') + '<br>' +
                                        (typeLabel ? '<em>' + typeLabel + '</em> &mdash; ' : '') +
                                        '<em>' + stop.time + '</em>'
                                    )
                                    .addTo(routeLayer);
                                points.push([stop.lat, stop.lng]);
                            });

                            if (points.length >= 2) {
                                L.polyline(points, {
                                    color: repColor, weight: 4, opacity: 0.8, dashArray: '10, 8'
                                }).addTo(routeLayer);
                            }
                            allPoints = allPoints.concat(points);
                        });

                        if (allPoints.length >= 2) {
                            map.fitBounds(L.latLngBounds(allPoints), { padding: [50, 50] });
                        }
                        return;
                    }

                    // Single-rep fallback (no assignments)
                    if (!data.stops || data.stops.length === 0) {
                        alert('No appointments on this date');
                        return;
                    }

                    var repColor = (data.rep && data.rep.color) ? data.rep.color : '#2980b9';
                    var points = [];

                    if (data.rep && data.rep.lat && data.rep.lng) {
                        var homeIcon = L.divIcon({
                            className: 'route-marker',
                            html: '<div style="background:' + repColor + ';width:28px;height:28px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 0 6px rgba(0,0,0,0.4);">&#9733;</div>',
                            iconSize: [24, 24],
                            iconAnchor: [12, 12]
                        });
                        L.marker([data.rep.lat, data.rep.lng], { icon: homeIcon })
                            .bindPopup('<strong>' + data.rep.name + ' (Home)</strong><br>' + data.rep.home_address)
                            .addTo(routeLayer);
                        points.push([data.rep.lat, data.rep.lng]);
                    }

                    var typeColors = { solar: '#f1c40f', hvac: '#e74c3c', both: '#27ae60' };
                    data.stops.forEach(function(stop, i) {
                        var pinColor = typeColors[stop.type] || repColor;
                        var stopIcon = L.divIcon({
                            className: 'route-marker',
                            html: '<div style="background:' + pinColor + ';width:24px;height:24px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;box-shadow:0 0 6px rgba(0,0,0,0.4);">' + (i + 1) + '</div>',
                            iconSize: [24, 24],
                            iconAnchor: [12, 12]
                        });
                        var typeLabel = stop.type ? stop.type.charAt(0).toUpperCase() + stop.type.slice(1) : '';
                        L.marker([stop.lat, stop.lng], { icon: stopIcon })
                            .bindPopup(
                                '<strong>' + (i + 1) + '. ' + stop.name + '</strong><br>' +
                                stop.address + (stop.city ? ', ' + stop.city : '') + '<br>' +
                                (typeLabel ? '<em>' + typeLabel + '</em> &mdash; ' : '') +
                                '<em>' + stop.time + '</em>'
                            )
                            .addTo(routeLayer);
                        points.push([stop.lat, stop.lng]);
                    });

                    if (points.length >= 2) {
                        L.polyline(points, {
                            color: repColor, weight: 4, opacity: 0.8, dashArray: '10, 8'
                        }).addTo(routeLayer);
                        map.fitBounds(L.latLngBounds(points), { padding: [50, 50] });
                    }
                });
        }

        // Route panel toggle
        function toggleRoutePanel() {
            var panel = document.getElementById('route-panel');
            var arrow = document.getElementById('route-panel-arrow');
            panel.classList.toggle('collapsed');
            arrow.innerHTML = panel.classList.contains('collapsed') ? '&#9654;' : '&#9660;';
        }

        // Sidebar
        var pendingAssignments = null; // holds proposed assignments before confirm

        function toggleSidebar() {
            var sidebar = document.getElementById('sidebar');
            var toggle = document.getElementById('sidebar-toggle');
            var isOpen = sidebar.classList.contains('open');
            if (isOpen) {
                sidebar.classList.remove('open');
                toggle.innerHTML = '&#9664;';
            } else {
                sidebar.classList.add('open');
                toggle.innerHTML = '&#9654;';
            }
        }

        function openSidebar() {
            var sidebar = document.getElementById('sidebar');
            if (!sidebar.classList.contains('open')) toggleSidebar();
        }

        var typeColorMap = { solar: '#f1c40f', hvac: '#e74c3c', both: '#27ae60' };

        function updateSidebar(assignData) {
            var container = document.getElementById('sidebar-content');
            var html = '';

            if (assignData && assignData.assignments && assignData.assignments.length > 0) {
                assignData.assignments.forEach(function(group) {
                    var rep = group.rep;
                    function parseTime12h(str) {
                        if (!str) return 99999;
                        var m = str.match(/(\d+):(\d+)\s*(AM|PM)/i);
                        if (!m) return 99999;
                        var h = parseInt(m[1]), min = parseInt(m[2]), period = m[3].toUpperCase();
                        if (period === 'PM' && h !== 12) h += 12;
                        if (period === 'AM' && h === 12) h = 0;
                        return h * 60 + min;
                    }
                    var sortedStops = group.stops.slice().sort(function(a, b) {
                        return parseTime12h(a.time || a.estimated_arrival) - parseTime12h(b.time || b.estimated_arrival);
                    });
                    html += '<div class="sidebar-group">';
                    html += '<div class="sidebar-group-title"><span class="rep-dot" style="background:' + (rep.color || '#2980b9') + '"></span>' + rep.name + ' (' + sortedStops.length + ')</div>';
                    sortedStops.forEach(function(stop) {
                        var badgeColor = typeColorMap[stop.type] || '#999';
                        var displayName = (stop.name || 'Unknown') + (stop.city ? ', ' + stop.city : '');
                        html += '<div class="sidebar-row" style="border-left-color:' + (rep.color || '#2980b9') + '" onclick="panTo(' + stop.lat + ',' + stop.lng + ')">';
                        html += '<div class="appt-name">' + displayName + '</div>';
                        html += '<div class="appt-details">';
                        if (stop.phone) html += '<span>' + stop.phone + '</span>';
                        if (stop.type) html += '<span class="appt-type-badge" style="background:' + badgeColor + '">' + stop.type + '</span>';
                        if (stop.time) html += '<span>' + stop.time + '</span>';
                        else if (stop.estimated_arrival) html += '<span>' + stop.estimated_arrival + '</span>';
                        html += '<select class="sidebar-assign-select" onchange="previewReassign(' + stop.lead_id + ', ' + rep.id + ', this.value); event.stopPropagation();" onclick="event.stopPropagation();">';
                        html += '<option value="">Unassigned</option>';
                        allReps.forEach(function(r) {
                            html += '<option value="' + r.id + '"' + (r.id == rep.id ? ' selected' : '') + '>' + r.name + '</option>';
                        });
                        html += '</select>';
                        html += '</div>';
                        html += '</div>';
                    });
                    html += '</div>';
                });

                if (assignData.unassigned && assignData.unassigned.length > 0) {
                    html += '<div class="sidebar-group">';
                    html += '<div class="sidebar-group-title"><span class="rep-dot" style="background:#ccc"></span>Unassigned (' + assignData.unassigned.length + ')</div>';
                    assignData.unassigned.forEach(function(lead) {
                        var badgeColor = typeColorMap[lead.type] || '#999';
                        var displayName = (lead.name || 'Unknown') + (lead.city ? ', ' + lead.city : '');
                        html += '<div class="sidebar-row" style="border-left-color:#ccc">';
                        html += '<div class="appt-name">' + displayName + '</div>';
                        html += '<div class="appt-details">';
                        if (lead.phone) html += '<span>' + lead.phone + '</span>';
                        if (lead.type) html += '<span class="appt-type-badge" style="background:' + badgeColor + '">' + lead.type + '</span>';
                        if (lead.time) html += '<span>' + lead.time + '</span>';
                        html += '<select class="sidebar-assign-select" onchange="previewAssignRep(' + lead.lead_id + ', this.value); event.stopPropagation();" onclick="event.stopPropagation();">';
                        html += '<option value="" selected>Unassigned</option>';
                        allReps.forEach(function(rep) {
                            html += '<option value="' + rep.id + '">' + rep.name + '</option>';
                        });
                        html += '</select>';
                        html += '</div>';
                        html += '</div>';
                    });
                    html += '</div>';
                }
            } else {
                // Show leads from allLeads for this date
                var dateVal = document.getElementById('route-date').value;
                var dayLeads = allLeads.filter(function(lead) {
                    if (!lead.appointment_datetime) return false;
                    var parts = lead.appointment_datetime.split(' ');
                    var dateParts = parts[0].split('/');
                    var leadDate = dateParts[2] + '-' + dateParts[0].padStart(2, '0') + '-' + dateParts[1].padStart(2, '0');
                    return leadDate === dateVal;
                });

                // Sort by time portion (extract HH:MM AM/PM and compare)
                dayLeads.sort(function(a, b) {
                    var dtA = a.appointment_datetime || '';
                    var dtB = b.appointment_datetime || '';
                    // Format is "MM/DD/YYYY HH:MM AM/PM" — parse to Date for proper sort
                    var dA = dtA ? new Date(dtA) : new Date(0);
                    var dB = dtB ? new Date(dtB) : new Date(0);
                    return dA - dB;
                });

                if (dayLeads.length === 0) {
                    html = '<div class="sidebar-empty">No appointments on this date</div>';
                } else {
                    html += '<div class="sidebar-group">';
                    html += '<div class="sidebar-group-title">All Appointments (' + dayLeads.length + ')</div>';
                    dayLeads.forEach(function(lead) {
                        var badgeColor = (!lead.appointment_type || !lead.appointment_format) ? '#ff69b4' : (typeColorMap[lead.appointment_type] || '#ff69b4');
                        var displayName = (lead.homeowner_name || lead.address) + (lead.city ? ', ' + lead.city : '');
                        // Extract time from appointment_datetime "MM/DD/YYYY HH:MM AM/PM"
                        var timeStr = '';
                        if (lead.appointment_datetime) {
                            var parts = lead.appointment_datetime.split(' ');
                            if (parts.length >= 3) timeStr = parts[1] + ' ' + parts[2];
                        }
                        html += '<div class="sidebar-row" onclick="panTo(' + lead.lat + ',' + lead.lng + ')">';
                        html += '<div class="appt-name">' + displayName + '</div>';
                        html += '<div class="appt-details">';
                        if (lead.phone_number) html += '<span>' + lead.phone_number + '</span>';
                        var badgeLabel = lead.appointment_type || 'unknown';
                        html += '<span class="appt-type-badge" style="background:' + badgeColor + '">' + badgeLabel + '</span>';
                        if (timeStr) html += '<span>' + timeStr + '</span>';
                        html += '<select class="sidebar-assign-select" onchange="assignRep(' + lead.id + ', this.value); event.stopPropagation();" onclick="event.stopPropagation();">';
                        html += '<option value=""' + (!lead.rep_id ? ' selected' : '') + '>Unassigned</option>';
                        allReps.forEach(function(rep) {
                            html += '<option value="' + rep.id + '"' + (lead.rep_id == rep.id ? ' selected' : '') + '>' + rep.name + '</option>';
                        });
                        html += '</select>';
                        html += '</div>';
                        html += '</div>';
                    });
                    html += '</div>';
                }
            }

            container.innerHTML = html;

            // Fetch time off for this date and append to sidebar
            var dateVal = document.getElementById('route-date').value;
            if (dateVal) {
                fetch('/api/time-off/by-date/?date=' + dateVal)
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.time_off && data.time_off.length > 0) {
                            var offHtml = '<div class="sidebar-group" style="margin-top:12px;">';
                            offHtml += '<div class="sidebar-group-title" style="color:#e74c3c;"><span class="rep-dot" style="background:#e74c3c"></span>Reps Off (' + data.time_off.length + ')</div>';
                            data.time_off.forEach(function(to) {
                                var timeStr = to.all_day ? 'All Day' : to.start_time + ' — ' + to.end_time;
                                offHtml += '<div class="sidebar-row" style="border-left-color:#e74c3c; opacity:0.8;">';
                                offHtml += '<div class="appt-name">' + to.rep_name + '</div>';
                                offHtml += '<div class="appt-details">';
                                offHtml += '<span>' + timeStr + '</span>';
                                if (to.reason) offHtml += '<span style="font-style:italic; color:#999;">' + to.reason + '</span>';
                                offHtml += '</div></div>';
                            });
                            offHtml += '</div>';
                            container.innerHTML += offHtml;
                        }
                    });
            }
        }

        function panTo(lat, lng) {
            map.setView([lat, lng], 13);
        }

        function previewReassign(leadId, fromRepId, toRepId) {
            if (!pendingAssignments) return;
            // Remove lead from current rep's group
            var lead = null;
            pendingAssignments.assignments.forEach(function(group) {
                if (group.rep.id == fromRepId) {
                    group.stops = group.stops.filter(function(s) {
                        if (s.lead_id === leadId) { lead = s; return false; }
                        return true;
                    });
                }
            });
            // Remove empty groups
            pendingAssignments.assignments = pendingAssignments.assignments.filter(function(g) {
                return g.stops.length > 0;
            });
            if (!lead) return;
            if (!toRepId) {
                // Move to unassigned
                if (!pendingAssignments.unassigned) pendingAssignments.unassigned = [];
                pendingAssignments.unassigned.push(lead);
            } else {
                // Move to target rep
                var found = false;
                pendingAssignments.assignments.forEach(function(group) {
                    if (group.rep.id == toRepId) {
                        group.stops.push(lead);
                        found = true;
                    }
                });
                if (!found) {
                    var repInfo = allReps.find(function(r) { return r.id == toRepId; });
                    if (repInfo) {
                        pendingAssignments.assignments.push({
                            rep: { id: repInfo.id, name: repInfo.name, color: repInfo.color, lat: repInfo.lat, lng: repInfo.lng, home_address: repInfo.home_address },
                            stops: [lead]
                        });
                    }
                }
            }
            updateSidebar(pendingAssignments);
        }

        function previewAssignRep(leadId, repId) {
            if (!pendingAssignments || !repId) return;
            // Move lead from unassigned into the matching rep's assignment group
            var lead = null;
            pendingAssignments.unassigned = pendingAssignments.unassigned.filter(function(l) {
                if (l.lead_id === leadId) { lead = l; return false; }
                return true;
            });
            if (lead) {
                var found = false;
                pendingAssignments.assignments.forEach(function(group) {
                    if (group.rep.id == repId) {
                        group.stops.push(lead);
                        found = true;
                    }
                });
                if (!found) {
                    // Rep not in assignments yet — find rep info and create group
                    var repInfo = allReps.find(function(r) { return r.id == repId; });
                    if (repInfo) {
                        pendingAssignments.assignments.push({
                            rep: { id: repInfo.id, name: repInfo.name, color: repInfo.color, lat: repInfo.lat, lng: repInfo.lng, home_address: repInfo.home_address },
                            stops: [lead]
                        });
                    }
                }
                // Re-render sidebar with updated data
                updateSidebar(pendingAssignments);
            }
        }

        function assignRep(leadId, repId) {
            fetch('/api/leads/' + leadId + '/', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rep_id: repId })
            }).then(function() {
                // Update local data
                allLeads.forEach(function(lead) {
                    if (lead.id === leadId) {
                        lead.rep_id = repId ? parseInt(repId) : null;
                        var rep = allReps.find(function(r) { return r.id == repId; });
                        lead.rep_name = rep ? rep.name : '';
                    }
                });
            });
        }

        function autoAssign() {
            var dateVal = document.getElementById('route-date').value;
            if (!dateVal) { alert('Pick a date first'); return; }

            var statusEl = document.getElementById('assign-status');
            statusEl.textContent = 'Assigning...';

            fetch('/api/auto-assign/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date: dateVal })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    statusEl.textContent = 'Error: ' + data.error;
                    return;
                }
                var s = data.summary;
                statusEl.innerHTML = '<strong>' + s.assigned + '/' + s.total_leads +
                    '</strong> assigned to <strong>' + s.reps_used + '</strong> rep(s)';
                if (s.unassigned > 0) {
                    statusEl.innerHTML += '<br><span style="color:#e74c3c;">' +
                        s.unassigned + ' unassigned</span>';
                }
                statusEl.innerHTML += '<br><em style="font-size:10px;">Preview — click Confirm to save</em>';

                // Store pending assignments for confirm
                pendingAssignments = data;

                // Show confirm/redo buttons
                document.getElementById('confirm-bar').classList.add('show');

                // Show routes preview on map
                renderPreviewRoutes(data);

                // Update sidebar with proposed assignments
                updateSidebar(data);
                openSidebar();
            });
        }

        function renderPreviewRoutes(data) {
            routeLayer.clearLayers();

            var allPoints = [];
            var typeColors = { solar: '#f1c40f', hvac: '#e74c3c', both: '#27ae60' };

            data.assignments.forEach(function(assignment) {
                var rep = assignment.rep;
                var repColor = rep.color || '#2980b9';
                var points = [];

                if (rep.lat && rep.lng) {
                    var homeIcon = L.divIcon({
                        className: 'route-marker',
                        html: '<div style="background:' + repColor + ';width:28px;height:28px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 0 6px rgba(0,0,0,0.4);">&#9733;</div>',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });
                    L.marker([rep.lat, rep.lng], { icon: homeIcon })
                        .bindPopup('<strong>' + rep.name + ' (Home)</strong><br>' + rep.home_address)
                        .addTo(routeLayer);
                    points.push([rep.lat, rep.lng]);
                }

                assignment.stops.forEach(function(stop, i) {
                    var pinColor = typeColors[stop.type] || repColor;
                    var stopIcon = L.divIcon({
                        className: 'route-marker',
                        html: '<div style="background:' + pinColor + ';width:24px;height:24px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;box-shadow:0 0 6px rgba(0,0,0,0.4);">' + (i + 1) + '</div>',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });
                    var typeLabel = stop.type ? stop.type.charAt(0).toUpperCase() + stop.type.slice(1) : '';
                    L.marker([stop.lat, stop.lng], { icon: stopIcon })
                        .bindPopup(
                            '<strong>' + rep.name + ' #' + (i + 1) + ': ' + stop.name + '</strong><br>' +
                            stop.address + (stop.city ? ', ' + stop.city : '') + '<br>' +
                            (typeLabel ? '<em>' + typeLabel + '</em> &mdash; ' : '') +
                            '<em>' + stop.estimated_arrival + '</em>'
                        )
                        .addTo(routeLayer);
                    points.push([stop.lat, stop.lng]);
                });

                if (points.length >= 2) {
                    L.polyline(points, {
                        color: repColor, weight: 4, opacity: 0.8, dashArray: '10, 8'
                    }).addTo(routeLayer);
                }
                allPoints = allPoints.concat(points);
            });

            if (allPoints.length >= 2) {
                map.fitBounds(L.latLngBounds(allPoints), { padding: [50, 50] });
            }
        }

        function confirmAssignments() {
            if (!pendingAssignments) return;

            // Build lead_id -> rep_id mapping
            var mapping = {};
            pendingAssignments.assignments.forEach(function(group) {
                group.stops.forEach(function(stop) {
                    mapping[stop.lead_id] = group.rep.id;
                });
            });

            fetch('/api/confirm-assignments/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ assignments: mapping })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('assign-status').innerHTML =
                    '<strong style="color:#27ae60;">Confirmed!</strong> ' + data.confirmed + ' appointments saved';
                document.getElementById('confirm-bar').classList.remove('show');
                // Keep routes on map — they're already rendered and match the saved assignments
                pendingAssignments = null;
                // Refresh leads data (sidebar will update but routes stay)
                fetchLeads();
            });
        }

        function redoAssignments() {
            pendingAssignments = null;
            document.getElementById('confirm-bar').classList.remove('show');
            document.getElementById('assign-status').textContent = '';
            clearRoute();
            updateSidebar(null);
        }

        function clearAssignments() {
            var dateVal = document.getElementById('route-date').value;
            if (!dateVal) { alert('Pick a date first'); return; }
            if (!confirm('Clear all assignments for ' + dateVal + '?')) return;

            fetch('/api/clear-assignments/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date: dateVal })
            })
            .then(function(r) { return r.json(); })
            .then(function() {
                document.getElementById('assign-status').textContent = 'Assignments cleared';
                document.getElementById('confirm-bar').classList.remove('show');
                pendingAssignments = null;
                clearRoute();
                fetchLeads();
                updateSidebar(null);
            });
        }

        function clearRoute() {
            routeLayer.clearLayers();
        }

        // Disable sidebar rep dropdowns for non-managers
        if (!IS_MANAGER) {
            var observer = new MutationObserver(function() {
                document.querySelectorAll('.sidebar-assign-select').forEach(function(s) {
                    s.disabled = true;
                    s.style.opacity = '0.7';
                });
            });
            observer.observe(document.getElementById('sidebar-content'), { childList: true, subtree: true });
        }
    </script>
