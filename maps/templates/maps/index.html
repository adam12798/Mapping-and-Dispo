{% load static %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapping & Dispo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'maps/style.css' %}" />
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="nav-tab active">Map</a>
        <a href="/crm/" class="nav-tab">CRM</a>
        <a href="/reps/" class="nav-tab">Reps</a>
    </nav>
    <div id="map"></div>
    <div class="route-panel">
        <h4>Route Planner</h4>
        <input type="date" id="route-date" />
        <div style="display:flex;gap:6px;margin-top:2px;">
            <button onclick="showRoute()">Show Route</button>
            <button class="tomorrow-btn" onclick="setTomorrow()">Tomorrow</button>
        </div>
        <button class="tomorrow-btn" style="margin-top:4px;width:100%;" onclick="clearRoute()">Clear Route</button>
        <hr style="margin:8px 0;border:none;border-top:1px solid #ddd;">
        <button class="add-btn" style="width:100%;font-size:12px;padding:6px 12px;" onclick="autoAssign()">Auto-Assign</button>
        <button class="tomorrow-btn" style="margin-top:4px;width:100%;" onclick="clearAssignments()">Clear Assignments</button>
        <div id="assign-status" style="margin-top:6px;font-size:11px;color:#666;"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

            zoom: 9.5,
            zoomControl: false,
            minZoom: 8,
            maxZoom: 16,
            zoomDelta: 0.5,
            zoomSnap: 0.5,
            wheelDebounceTime: 100,
            wheelPxPerZoomLevel: 120

        // Light base tiles (will be mostly hidden by town polygons)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {

        // Fetch MA town boundaries GeoJSON
        fetch('https://raw.githubusercontent.com/nblmc/massachusetts-municipal-boundaries/main/data-cooked/mass-municipalities.geojson')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                // Add town polygons colored by provider
                L.geoJSON(data, {
                    style: function(feature) {
                        var name = feature.properties.census_name || '';
                        var normalized = name.replace(/ Town$/, '').replace(/^Manchester-by-the-Sea$/, 'Manchester');
                        var provider = townProviders[normalized] || townProviders[name];
                        var color = provider ? providerColors[provider] : '#e0e0e0';
                        return {
                            fillColor: color,
                            fillOpacity: 0.7,
                            color: '#555',
                            weight: 1,
                            opacity: 0.5
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        var name = feature.properties.census_name || 'Unknown';
                        var normalized = name.replace(/ Town$/, '').replace(/^Manchester-by-the-Sea$/, 'Manchester');
                        // Check if this is a major city (has a pin)
                        var majorCities = ['Boston', 'Worcester', 'Springfield', 'Lowell', 'Cambridge',
                            'New Bedford', 'Brockton', 'Quincy', 'Lynn', 'Fall River', 'Pittsfield',
                            'Framingham', 'Haverhill', 'Plymouth', 'Barnstable', 'Northampton'];
                        if (majorCities.indexOf(normalized) !== -1) {
                            layer.options.interactive = false;
                        } else {
                            var provider = townProviders[normalized] || townProviders[name] || 'Unknown';
                            layer.bindTooltip(name + '<br><em>' + provider + '</em>', {
                                sticky: true,
                                className: 'town-tooltip'
                            });
                        }
                    }
                }).addTo(map);

                // Build mask from town polygons (much more accurate than state outline)
                var outer = [[-90, -180], [-90, 180], [90, 180], [90, -180], [-90, -180]];
                var allHoles = [];

                data.features.forEach(function(feature) {
                    var geom = feature.geometry;
                    var coords = geom.coordinates;
                    if (geom.type === 'Polygon') {
                        coords.forEach(function(ring) {
                            allHoles.push(ring.map(function(c) { return [c[1], c[0]]; }));
                        });
                    } else if (geom.type === 'MultiPolygon') {
                        coords.forEach(function(poly) {
                            poly.forEach(function(ring) {
                                allHoles.push(ring.map(function(c) { return [c[1], c[0]]; }));
                            });
                        });
                    }
                });

                // Single mask polygon with all town shapes as holes
                L.polygon([outer].concat(allHoles), {
                    color: '#333',
                    weight: 1,
                    fillColor: '#ffffff',
                    fillOpacity: 1,
                    interactive: false
                }).addTo(map);

                addCities();
            })
            .catch(function() {
                addCities();
            });

        function addCities() {
            var cities = [
                ['Boston', 42.3601, -71.0589, true],
                ['Worcester', 42.2626, -71.8023, true],
                ['Springfield', 42.1015, -72.5898, true],
                ['Lowell', 42.6334, -71.3162, false],
                ['Cambridge', 42.3736, -71.1097, false],
                ['New Bedford', 41.6362, -70.9342, false],
                ['Brockton', 42.0834, -71.0184, false],
                ['Quincy', 42.2529, -71.0023, false],
                ['Lynn', 42.4668, -70.9495, false],
                ['Fall River', 41.7015, -71.1550, false],
                ['Pittsfield', 42.4501, -73.2454, false],
                ['Framingham', 42.2793, -71.4162, false],
                ['Haverhill', 42.7762, -71.0773, false],
                ['Plymouth', 41.9584, -70.6673, false],
                ['Barnstable', 41.7003, -70.3002, false],
                ['Northampton', 42.3251, -72.6412, false]
            ];

            cities.forEach(function(city) {
                var name = city[0], lat = city[1], lng = city[2], isMajor = city[3];

                var dotIcon = L.divIcon({
                    className: 'city-dot' + (isMajor ? ' major' : ''),
                    iconSize: isMajor ? [12, 12] : [8, 8],
                    iconAnchor: isMajor ? [6, 6] : [4, 4]
                });

                L.marker([lat, lng], { icon: dotIcon })
                    .bindTooltip(name, {
                        permanent: false,
                        direction: 'right',
                        offset: [8, 0],
                        className: 'city-label'
                    })
                    .addTo(map);
            });
        }

        // Lead pin colors by appointment type
        var leadTypeColors = { solar: '#f1c40f', hvac: '#e74c3c', both: '#27ae60' };
        var leadsLayer = L.layerGroup().addTo(map);
        var allLeads = [];

        // Fetch all leads once, then filter by date
        function fetchLeads() {
            fetch('/api/leads/')
                .then(function(r) { return r.json(); })
                .then(function(leads) {
                    allLeads = leads;
                    filterLeadsByDate();
                });
        }

        function filterLeadsByDate() {
            leadsLayer.clearLayers();
            var dateVal = document.getElementById('route-date').value;
            allLeads.forEach(function(lead) {
                // Only show leads with appointments on the selected date
                if (!lead.appointment_datetime) return;
                // appointment_datetime format: "MM/DD/YYYY HH:MM AM/PM"
                var parts = lead.appointment_datetime.split(' ');
                var dateParts = parts[0].split('/');
                var leadDate = dateParts[2] + '-' + dateParts[0].padStart(2, '0') + '-' + dateParts[1].padStart(2, '0');
                if (leadDate !== dateVal) return;

                var color = leadTypeColors[lead.appointment_type] || '#e74c3c';
                var pinIcon = L.divIcon({
                    className: 'lead-pin',
                    html: '<div style="width:16px;height:16px;background:' + color + ';border:3px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,0.5);"></div>',
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                });

                L.marker([lead.lat, lead.lng], { icon: pinIcon })
                    .bindPopup(
                        '<strong>' + lead.address + '</strong><br>' +
                        (lead.homeowner_name ? lead.homeowner_name + '<br>' : '') +
                        '<em>' + lead.appointment_datetime + '</em>'
                    )
                    .addTo(leadsLayer);
            });
        }

        // Default date to today
        var today = new Date();
        var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
        document.getElementById('route-date').value = todayStr;

        // Fetch leads after date is set
        fetchLeads();

        // Re-filter pins when date changes
        document.getElementById('route-date').addEventListener('change', function() {
            filterLeadsByDate();
            routeLayer.clearLayers();
        });

        function setTomorrow() {
            var tmrw = new Date();
            tmrw.setDate(tmrw.getDate() + 1);
            var tmrwStr = tmrw.getFullYear() + '-' + String(tmrw.getMonth() + 1).padStart(2, '0') + '-' + String(tmrw.getDate()).padStart(2, '0');
            document.getElementById('route-date').value = tmrwStr;
            filterLeadsByDate();
            routeLayer.clearLayers();
        }

        // Route overlay
        var routeLayer = L.layerGroup().addTo(map);

        function showRoute() {
            var dateVal = document.getElementById('route-date').value;
            if (!dateVal) { alert('Pick a date'); return; }

            routeLayer.clearLayers();
            map.removeLayer(leadsLayer);

            fetch('/api/route/?date=' + dateVal)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    // Multi-rep mode (assignments exist)
                    if (data.routes) {
                        if (data.routes.length === 0) {
                            alert('No assigned appointments on this date');
                            return;
                        }
                        var allPoints = [];
                        data.routes.forEach(function(route) {
                            var repColor = route.rep.color || '#2980b9';
                            var points = [];

                            // Rep home star
                            if (route.rep.lat && route.rep.lng) {
                                var homeIcon = L.divIcon({
                                    className: 'route-marker',
                                    html: '<div style="background:' + repColor + ';width:28px;height:28px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 0 6px rgba(0,0,0,0.4);">&#9733;</div>',
                                    iconSize: [24, 24],
                                    iconAnchor: [12, 12]
                                });
                                L.marker([route.rep.lat, route.rep.lng], { icon: homeIcon })
                                    .bindPopup('<strong>' + route.rep.name + ' (Home)</strong><br>' + route.rep.home_address)
                                    .addTo(routeLayer);
                                points.push([route.rep.lat, route.rep.lng]);
                            }

                            var typeColors = { solar: '#f1c40f', hvac: '#e74c3c', both: '#27ae60' };
                            route.stops.forEach(function(stop, i) {
                                var pinColor = typeColors[stop.type] || repColor;
                                var stopIcon = L.divIcon({
                                    className: 'route-marker',
                                    html: '<div style="background:' + pinColor + ';width:24px;height:24px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;box-shadow:0 0 6px rgba(0,0,0,0.4);">' + (i + 1) + '</div>',
                                    iconSize: [24, 24],
                                    iconAnchor: [12, 12]
                                });
                                var typeLabel = stop.type ? stop.type.charAt(0).toUpperCase() + stop.type.slice(1) : '';
                                L.marker([stop.lat, stop.lng], { icon: stopIcon })
                                    .bindPopup(
                                        '<strong>' + route.rep.name + ' #' + (i + 1) + ': ' + stop.name + '</strong><br>' +
                                        stop.address + (stop.city ? ', ' + stop.city : '') + '<br>' +
                                        (typeLabel ? '<em>' + typeLabel + '</em> &mdash; ' : '') +
                                        '<em>' + stop.time + '</em>'
                                    )
                                    .addTo(routeLayer);
                                points.push([stop.lat, stop.lng]);
                            });

                            if (points.length >= 2) {
                                L.polyline(points, {
                                    color: repColor, weight: 4, opacity: 0.8, dashArray: '10, 8'
                                }).addTo(routeLayer);
                            }
                            allPoints = allPoints.concat(points);
                        });

                        if (allPoints.length >= 2) {
                            map.fitBounds(L.latLngBounds(allPoints), { padding: [50, 50] });
                        }
                        return;
                    }

                    // Single-rep fallback (no assignments)
                    if (!data.stops || data.stops.length === 0) {
                        alert('No appointments on this date');
                        return;
                    }

                    var repColor = (data.rep && data.rep.color) ? data.rep.color : '#2980b9';
                    var points = [];

                    if (data.rep && data.rep.lat && data.rep.lng) {
                        var homeIcon = L.divIcon({
                            className: 'route-marker',
                            html: '<div style="background:' + repColor + ';width:28px;height:28px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 0 6px rgba(0,0,0,0.4);">&#9733;</div>',
                            iconSize: [24, 24],
                            iconAnchor: [12, 12]
                        });
                        L.marker([data.rep.lat, data.rep.lng], { icon: homeIcon })
                            .bindPopup('<strong>' + data.rep.name + ' (Home)</strong><br>' + data.rep.home_address)
                            .addTo(routeLayer);
                        points.push([data.rep.lat, data.rep.lng]);
                    }

                    var typeColors = { solar: '#f1c40f', hvac: '#e74c3c', both: '#27ae60' };
                    data.stops.forEach(function(stop, i) {
                        var pinColor = typeColors[stop.type] || repColor;
                        var stopIcon = L.divIcon({
                            className: 'route-marker',
                            html: '<div style="background:' + pinColor + ';width:24px;height:24px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;box-shadow:0 0 6px rgba(0,0,0,0.4);">' + (i + 1) + '</div>',
                            iconSize: [24, 24],
                            iconAnchor: [12, 12]
                        });
                        var typeLabel = stop.type ? stop.type.charAt(0).toUpperCase() + stop.type.slice(1) : '';
                        L.marker([stop.lat, stop.lng], { icon: stopIcon })
                            .bindPopup(
                                '<strong>' + (i + 1) + '. ' + stop.name + '</strong><br>' +
                                stop.address + (stop.city ? ', ' + stop.city : '') + '<br>' +
                                (typeLabel ? '<em>' + typeLabel + '</em> &mdash; ' : '') +
                                '<em>' + stop.time + '</em>'
                            )
                            .addTo(routeLayer);
                        points.push([stop.lat, stop.lng]);
                    });

                    if (points.length >= 2) {
                        L.polyline(points, {
                            color: repColor, weight: 4, opacity: 0.8, dashArray: '10, 8'
                        }).addTo(routeLayer);
                        map.fitBounds(L.latLngBounds(points), { padding: [50, 50] });
                    }
                });
        }

        function autoAssign() {
            var dateVal = document.getElementById('route-date').value;
            if (!dateVal) { alert('Pick a date first'); return; }
            if (!confirm('Auto-assign appointments for ' + dateVal + '?')) return;

            var statusEl = document.getElementById('assign-status');
            statusEl.textContent = 'Assigning...';

            fetch('/api/auto-assign/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date: dateVal })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    statusEl.textContent = 'Error: ' + data.error;
                    return;
                }
                var s = data.summary;
                statusEl.innerHTML = '<strong>' + s.assigned + '/' + s.total_leads +
                    '</strong> assigned to <strong>' + s.reps_used + '</strong> rep(s)';
                if (s.unassigned > 0) {
                    statusEl.innerHTML += '<br><span style="color:#e74c3c;">' +
                        s.unassigned + ' unassigned</span>';
                }
                showRoute();
            });
        }

        function clearAssignments() {
            var dateVal = document.getElementById('route-date').value;
            if (!dateVal) { alert('Pick a date first'); return; }
            if (!confirm('Clear all assignments for ' + dateVal + '?')) return;

            fetch('/api/clear-assignments/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date: dateVal })
            })
            .then(function(r) { return r.json(); })
            .then(function() {
                document.getElementById('assign-status').textContent = 'Assignments cleared';
                clearRoute();
            });
        }

        function clearRoute() {
            routeLayer.clearLayers();
            if (!map.hasLayer(leadsLayer)) {
                map.addLayer(leadsLayer);
            }
            filterLeadsByDate();
        }
    </script>
</body>
</html>
