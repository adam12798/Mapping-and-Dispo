            .then(function(r) { return r.json(); })
            .then(function(data) {
                // Add town polygons colored by provider
                L.geoJSON(data, {
                    style: function(feature) {
                        var name = feature.properties.census_name || '';
                        var normalized = name.replace(/ Town$/, '').replace(/^Manchester-by-the-Sea$/, 'Manchester');
                        var provider = townProviders[normalized] || townProviders[name];
                        var color = provider ? providerColors[provider] : '#e0e0e0';
                        return {
                            fillColor: color,
                            fillOpacity: 0.7,
                            color: '#555',
                            weight: 1,
                            opacity: 0.5
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        var name = feature.properties.census_name || 'Unknown';
                        var normalized = name.replace(/ Town$/, '').replace(/^Manchester-by-the-Sea$/, 'Manchester');
                        // Check if this is a major city (has a pin)
                        var majorCities = ['Boston', 'Worcester', 'Springfield', 'Lowell', 'Cambridge',
                            'New Bedford', 'Brockton', 'Quincy', 'Lynn', 'Fall River', 'Pittsfield',
                            'Framingham', 'Haverhill', 'Plymouth', 'Barnstable', 'Northampton'];
                        if (majorCities.indexOf(normalized) !== -1) {
                            layer.options.interactive = false;
                        } else {
                            var provider = townProviders[normalized] || townProviders[name] || 'Unknown';
                            layer.bindTooltip(name + '<br><em>' + provider + '</em>', {
                                sticky: true,
                                className: 'town-tooltip'
                            });
                        }
                    }
                }).addTo(map);

                // Build mask from town polygons (much more accurate than state outline)
                var outer = [[-90, -180], [-90, 180], [90, 180], [90, -180], [-90, -180]];
                var allHoles = [];

                data.features.forEach(function(feature) {
                    var geom = feature.geometry;
                    var coords = geom.coordinates;
                    if (geom.type === 'Polygon') {
                        coords.forEach(function(ring) {
                            allHoles.push(ring.map(function(c) { return [c[1], c[0]]; }));
                        });
                    } else if (geom.type === 'MultiPolygon') {
                        coords.forEach(function(poly) {
                            poly.forEach(function(ring) {
                                allHoles.push(ring.map(function(c) { return [c[1], c[0]]; }));
                            });
                        });
                    }
                });

                // Single mask polygon with all town shapes as holes
                L.polygon([outer].concat(allHoles), {
                    color: '#333',
                    weight: 1,
                    fillColor: '#ffffff',
                    fillOpacity: 1,
                    interactive: false
                }).addTo(map);

                addCities();
            })
            .catch(function() {
                addCities();
            });

        function addCities() {
            var cities = [
                ['Boston', 42.3601, -71.0589, true],
                ['Worcester', 42.2626, -71.8023, true],
                ['Springfield', 42.1015, -72.5898, true],
                ['Lowell', 42.6334, -71.3162, false],
                ['Cambridge', 42.3736, -71.1097, false],
                ['New Bedford', 41.6362, -70.9342, false],
                ['Brockton', 42.0834, -71.0184, false],
                ['Quincy', 42.2529, -71.0023, false],
                ['Lynn', 42.4668, -70.9495, false],
                ['Fall River', 41.7015, -71.1550, false],
                ['Pittsfield', 42.4501, -73.2454, false],
                ['Framingham', 42.2793, -71.4162, false],
                ['Haverhill', 42.7762, -71.0773, false],
                ['Plymouth', 41.9584, -70.6673, false],
                ['Barnstable', 41.7003, -70.3002, false],
                ['Northampton', 42.3251, -72.6412, false]
            ];

            cities.forEach(function(city) {
                var name = city[0], lat = city[1], lng = city[2], isMajor = city[3];

                var dotIcon = L.divIcon({
                    className: 'city-dot' + (isMajor ? ' major' : ''),
                    iconSize: isMajor ? [12, 12] : [8, 8],
                    iconAnchor: isMajor ? [6, 6] : [4, 4]
                });

                L.marker([lat, lng], { icon: dotIcon })
                    .bindTooltip(name, {
                        permanent: false,
                        direction: 'right',
                        offset: [8, 0],
                        className: 'city-label'
                    })
                    .addTo(map);
            });
        }

        // Fetch and display leads as pins
        function loadLeads() {
            fetch('/api/leads/')
                .then(function(r) { return r.json(); })
                .then(function(leads) {
                    leads.forEach(function(lead) {
                        var pinIcon = L.divIcon({
                            className: 'lead-pin',
                            iconSize: [16, 16],
                            iconAnchor: [8, 8]
                        });

                        L.marker([lead.lat, lead.lng], { icon: pinIcon })
                            .bindPopup(
                                '<strong>' + lead.address + '</strong><br>' +
                                '<em>' + lead.created_at + '</em>'
                            )
                            .addTo(map);
                    });
                });
        }

        // Load leads on page load, refresh every 30 seconds
        loadLeads();
        setInterval(loadLeads, 30000);
