{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM — Mapping & Dispo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'maps/style.css' %}" />
</head>
<body>
    <nav class="top-nav">
        <a href="/" class="nav-tab">Map</a>
        <a href="/crm/" class="nav-tab active">CRM</a>
        <a href="/reps/" class="nav-tab">Reps</a>
    </nav>
    <div class="crm-container">
        <div class="crm-header">
            <h2>Leads</h2>
            <button id="bulk-delete-btn" class="delete-btn bulk-delete" style="display:none;" onclick="bulkDelete()">Delete Selected</button>
        </div>
        <div class="crm-filters">
            <div class="filter-group">
                <label>Date</label>
                <input type="date" id="filter-date" onchange="filterTable()">
            </div>
            <div class="filter-group">
                <label>Product Type</label>
                <select id="filter-type" onchange="filterTable()">
                    <option value="">All</option>
                    <option value="solar">Solar</option>
                    <option value="hvac">HVAC</option>
                    <option value="both">Both</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Meeting Type</label>
                <select id="filter-format" onchange="filterTable()">
                    <option value="">All</option>
                    <option value="in_person">In Person</option>
                    <option value="virtual">Virtual</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Rep</label>
                <select id="filter-rep" onchange="filterTable()">
                    <option value="">All</option>
                    {% for rep in reps %}
                    <option value="{{ rep.id }}">{{ rep.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="filter-group">
                <label>Status</label>
                <select id="filter-status" onchange="filterTable()">
                    <option value="">All</option>
                    <option value="assigned">Assigned</option>
                    <option value="unassigned">Unassigned</option>
                </select>
            </div>
            <button class="filter-clear" onclick="clearFilters()">Clear</button>
        </div>
        <table class="crm-table">
            <thead>
                <tr>
                    <th class="checkbox-col"><input type="checkbox" id="select-all"></th>
                    <th>Homeowner Name</th>
                    <th>Phone Number</th>
                    <th>Street Address</th>
                    <th>City</th>
                    <th>Appt Type</th>
                    <th>Appt Format</th>
                    <th>Appt Date & Time</th>
                    <th>Status</th>
                    <th class="action-col"></th>
                </tr>
            </thead>
            <tbody>
                {% for lead in leads %}
                <tr data-id="{{ lead.id }}">
                    <td class="checkbox-col"><input type="checkbox" class="row-select"></td>
                    <td><input type="text" class="crm-input" data-field="homeowner_name" value="{{ lead.homeowner_name }}"></td>
                    <td><input type="text" class="crm-input" data-field="phone_number" value="{{ lead.phone_number }}"></td>
                    <td class="readonly">{{ lead.address }}</td>
                    <td><input type="text" class="crm-input" data-field="city" value="{{ lead.city }}"></td>
                    <td>
                        <select class="crm-select" data-field="appointment_type">
                            <option value="">—</option>
                            <option value="solar" {% if lead.appointment_type == "solar" %}selected{% endif %}>Solar</option>
                            <option value="hvac" {% if lead.appointment_type == "hvac" %}selected{% endif %}>HVAC</option>
                            <option value="both" {% if lead.appointment_type == "both" %}selected{% endif %}>Both</option>
                        </select>
                    </td>
                    <td>
                        <select class="crm-select" data-field="appointment_format">
                            <option value="">—</option>
                            <option value="in_person" {% if lead.appointment_format == "in_person" %}selected{% endif %}>In Person</option>
                            <option value="virtual" {% if lead.appointment_format == "virtual" %}selected{% endif %}>Virtual</option>
                        </select>
                    </td>
                    <td><input type="datetime-local" class="crm-input" data-field="appointment_datetime" value="{{ lead.appointment_datetime|date:'Y-m-d\TH:i'|default:'' }}"></td>
                    <td>
                        <select class="crm-select" data-field="rep_id">
                            <option value="" {% if not lead.rep %}selected{% endif %}>Unassigned</option>
                            {% for rep in reps %}
                            <option value="{{ rep.id }}" {% if lead.rep_id == rep.id %}selected{% endif %}>{{ rep.name }}</option>
                            {% endfor %}
                        </select>
                    </td>
                    <td class="action-col"><button class="delete-btn row-delete" onclick="deleteLead(this)">X</button></td>
                </tr>
                {% empty %}
                <tr><td colspan="10" class="empty-row">No leads yet</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        function saveField(leadId, field, value) {
            var body = {};
            body[field] = value;
            fetch('/api/leads/' + leadId + '/', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
        }

        function deleteLead(btn) {
            var row = btn.closest('tr');
            var leadId = row.dataset.id;
            if (!confirm('Delete this lead?')) return;
            fetch('/api/leads/' + leadId + '/', { method: 'DELETE' })
                .then(function() { row.remove(); updateBulkBtn(); });
        }

        function bulkDelete() {
            var checked = document.querySelectorAll('.row-select:checked');
            var ids = [];
            checked.forEach(function(cb) { ids.push(parseInt(cb.closest('tr').dataset.id)); });
            if (ids.length === 0) return;
            if (!confirm('Delete ' + ids.length + ' lead(s)?')) return;
            fetch('/api/leads/bulk-delete/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids: ids })
            }).then(function() {
                checked.forEach(function(cb) { cb.closest('tr').remove(); });
                document.getElementById('select-all').checked = false;
                updateBulkBtn();
            });
        }

        function updateBulkBtn() {
            var count = document.querySelectorAll('.row-select:checked').length;
            var btn = document.getElementById('bulk-delete-btn');
            if (count > 0) {
                btn.style.display = 'inline-block';
                btn.textContent = 'Delete Selected (' + count + ')';
            } else {
                btn.style.display = 'none';
            }
        }

        // Select all checkbox
        document.getElementById('select-all').addEventListener('change', function() {
            var checked = this.checked;
            document.querySelectorAll('.row-select').forEach(function(cb) { cb.checked = checked; });
            updateBulkBtn();
        });

        // Individual checkboxes
        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('row-select')) updateBulkBtn();
        });

        // Filtering
        function filterTable() {
            var fDate = document.getElementById('filter-date').value;
            var fType = document.getElementById('filter-type').value;
            var fFormat = document.getElementById('filter-format').value;
            var fRep = document.getElementById('filter-rep').value;
            var fStatus = document.getElementById('filter-status').value;

            document.querySelectorAll('tbody tr').forEach(function(row) {
                if (!row.dataset.id) return; // skip empty row
                var show = true;

                // Date filter — compare YYYY-MM-DD portion of datetime-local input
                if (fDate) {
                    var dtInput = row.querySelector('[data-field="appointment_datetime"]');
                    var dtVal = dtInput ? dtInput.value : '';
                    if (!dtVal || dtVal.substring(0, 10) !== fDate) show = false;
                }

                // Product type
                if (fType) {
                    var typeSelect = row.querySelector('[data-field="appointment_type"]');
                    if (!typeSelect || typeSelect.value !== fType) show = false;
                }

                // Meeting type
                if (fFormat) {
                    var fmtSelect = row.querySelector('[data-field="appointment_format"]');
                    if (!fmtSelect || fmtSelect.value !== fFormat) show = false;
                }

                // Rep
                if (fRep) {
                    var repSelect = row.querySelector('[data-field="rep_id"]');
                    if (!repSelect || repSelect.value !== fRep) show = false;
                }

                // Status
                if (fStatus) {
                    var repSelect2 = row.querySelector('[data-field="rep_id"]');
                    var repVal = repSelect2 ? repSelect2.value : '';
                    if (fStatus === 'assigned' && !repVal) show = false;
                    if (fStatus === 'unassigned' && repVal) show = false;
                }

                row.style.display = show ? '' : 'none';
            });
        }

        function clearFilters() {
            document.getElementById('filter-date').value = '';
            document.getElementById('filter-type').value = '';
            document.getElementById('filter-format').value = '';
            document.getElementById('filter-rep').value = '';
            document.getElementById('filter-status').value = '';
            filterTable();
        }

        // Field editing
        document.querySelectorAll('.crm-input, .crm-select').forEach(function(el) {
            el.addEventListener('change', function() {
                var row = this.closest('tr');
                var leadId = row.dataset.id;
                var field = this.dataset.field;
                saveField(leadId, field, this.value);
            });
        });
    </script>
</body>
</html>
