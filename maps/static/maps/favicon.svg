<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Water background (bottom half) -->
  <rect x="0" y="14" width="32" height="18" fill="#3d5a80"/>
  <!-- Sky background (top half) -->
  <rect x="0" y="0" width="32" height="14" fill="#e0fbfc"/>
  <!-- Iceberg top (above water) - white/ice -->
  <polygon points="16,3 22,14 10,14" fill="#ffffff" stroke="#98c1d9" stroke-width="0.5"/>
  <!-- Iceberg bottom (underwater) - light blue, larger -->
  <polygon points="10,14 22,14 26,26 6,26" fill="#98c1d9" opacity="0.85"/>
  <!-- Waterline -->
  <line x1="0" y1="14" x2="32" y2="14" stroke="#98c1d9" stroke-width="0.5"/>
</svg>
